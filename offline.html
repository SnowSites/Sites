<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Offline</title>
  <meta name="theme-color" content="#0b0b0f">
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Cantarell,Noto Sans,sans-serif;margin:0;min-height:100vh;display:grid;place-items:center;background:#0b0b0f;color:#fff}
    .card{max-width:520px;padding:24px 22px;border-radius:16px;background:rgba(255,255,255,.06);box-shadow:0 10px 30px rgba(0,0,0,.35)}
    h1{margin:0 0 8px;font-size:22px}
    p{margin:0 0 14px;opacity:.9;line-height:1.4}
    button{border:0;border-radius:12px;padding:10px 14px;font-weight:700;cursor:pointer}
  </style>
</head>
<body>
  <div class="card">
    <h1>Você está offline</h1>
    <p>Sem internet no momento. Assim que voltar, recarregue a página.</p>
    <button onclick="location.reload()">Tentar novamente</button>
  </div>
</body>
</html>
